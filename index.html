<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shhh — Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #F4F4F2; }
  body { font-family: 'Geist', system-ui, sans-serif; color: #0A0A0A; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  * { box-sizing: border-box; }
  button { font: inherit; }
  input, select, textarea { font: inherit; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: rgba(10,10,10,0.18); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: #2D4BFF; cursor: pointer; }

  /* Customisable dashboard: reveal drag/remove chrome on card hover */
  .dash-cell:hover > .dash-chrome { opacity: 1 !important; }
  .dash-cell { cursor: default; }
  @keyframes helpPulse { 0% { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 0 0 rgba(45,75,255,0.5); } 70% { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 0 12px rgba(45,75,255,0); } 100% { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 0 0 rgba(45,75,255,0); } }

  @keyframes shhh-cta-flow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes aConfirmIn { 0%{ opacity:0; transform: translateY(8px) scale(0.98) } 100%{ opacity:1; transform: none } }
  .shhh-grad-text {
    background-image: linear-gradient(120deg, #FF4FB8 0%, #B14BE8 35%, #6E4DF8 65%, #2D4BFF 100%);
    background-size: 220% 220%; animation: shhh-cta-flow 7s ease-in-out infinite;
    -webkit-background-clip: text; background-clip: text;
    color: transparent !important; -webkit-text-fill-color: transparent;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Live data: Supabase config + loader (plain JS, runs before the app) -->
<script src="supabase-live.js"></script>

<!-- Storefront data reused as the admin's source of truth (fallback if Supabase is unreachable) -->
<script type="text/babel" src="shop-data.jsx"></script>
<script type="text/babel" src="shop-i18n.jsx"></script>
<script type="text/babel" src="shop-promo.jsx"></script>
<script type="text/babel" src="shop-content.jsx"></script>
<script type="text/babel" src="shop-brands.jsx"></script>

<!-- Admin -->
<script type="text/babel" src="admin-data.jsx"></script>
<script type="text/babel" src="admin-ui.jsx"></script>
<script type="text/babel" src="admin-vies.jsx"></script>
<script type="text/babel" src="admin-screens-1.jsx"></script>
<script type="text/babel" src="admin-screens-2.jsx"></script>
<script type="text/babel" src="admin-screens-3.jsx"></script>
<script type="text/babel" src="admin-screens-4.jsx"></script>
<script type="text/babel" src="admin-screens-5.jsx"></script>

<!-- Reports + Finances hubs — single file (no cross-file load dependency) -->
<script type="text/babel" src="admin-reports.jsx"></script>

<script type="text/babel" src="admin-settings.jsx"></script>
<script type="text/babel" src="admin-cms.jsx"></script>
<script type="text/babel" src="admin-help.jsx"></script>
<script type="text/babel" src="admin-help-guides.jsx"></script>
<script type="text/babel" src="admin-search.jsx"></script>
<script type="text/babel" src="admin-report.jsx"></script>
<script type="text/babel" src="admin-devtools.jsx"></script>
<script type="text/babel" src="admin-app.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  (async () => {
    try {
      await window.SHHH_LIVE.restoreSession();
      await window.SHHH_LIVE.load();
    } catch (e) {
      window.SHHH_LIVE.status = 'fallback';
      console.warn('[shhh] Supabase unavailable — using built-in demo data.', e);
    }
    root.render(<AdminApp />);
  })();
</script>

</body>
</html>
