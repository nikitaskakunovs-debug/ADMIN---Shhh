<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shhh — Quiet pleasure, delivered discreetly</title>
<style>html,body{margin:0;background:#F4F4F2}</style>
<script>
  // Route to the experience built for this device. ?view=desktop / ?view=mobile
  // forces one (and is remembered for the session).
  (function () {
    var qs = new URLSearchParams(location.search);
    var forced = qs.get('view');
    if (forced === 'desktop' || forced === 'mobile') sessionStorage.setItem('shhh_view', forced);
    var pref = sessionStorage.getItem('shhh_view');
    var mobile = pref ? pref === 'mobile'
      : (Math.min(screen.width, screen.height) < 768 || /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent));
    location.replace((mobile ? 'mobile.html' : 'desktop.html') + location.search + location.hash);
  })();
</script>
</head>
<body></body>
</html>
